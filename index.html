<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSS CLUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #e0e0e0;
            background-color: #0d0d0d;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
            letter-spacing: 2px;
        }
        
        .tagline {
            font-style: italic;
            color: #888888;
            margin-bottom: 20px;
        }
        
        .bio {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 3px solid #4a4a4a;
        }
        
        .bio p {
            margin-bottom: 15px;
        }
        
        .links {
            text-align: center;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #8b0000;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        
        .btn:hover {
            background-color: #a52a2a;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>VSS CLUB</h1>
            <p class="tagline">Dunedin, New Zealand</p>
        </header>
        
        <section class="bio">
            <h2>About</h2>
            <p>VSS CLUB is Stef Animal and Paul Fox. Based in Dunedin, New Zealand, they create music using initially improvised pieces that are then sculpted into the final product.</p>
        </section>
        
        <section class="links">
            <a href="https://vssclub.bandcamp.com/album/vss-club" class="btn" target="_blank" rel="noopener noreferrer">Listen on Bandcamp</a>
        </section>
        
        <footer>
            <p>&copy; 2026 VSS CLUB. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
